name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Syntax / lint check (fast, no Docker)
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      # Only check critical pyflakes errors (F-codes).
      # W/E style issues are pre-existing in the codebase and excluded here.
      # F401 (unused import) also excluded — pre-existing across all files.
      # Still catches: F811 (duplicate def), F541 (empty f-string), F821 (undefined name), etc.
      - name: Lint backend/
        run: flake8 backend/ --select=F --extend-ignore=F401 --exclude=backend/check_openai.py

  # ──────────────────────────────────────────────
  # Job 2: Docker build + container health check
  # ──────────────────────────────────────────────
  docker-test:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Pre-flight: make sure the vector DB is present in the repo ──
      - name: Verify my_chroma_db exists in repo
        run: |
          if [ ! -d "my_chroma_db" ]; then
            echo "ERROR: my_chroma_db/ is missing from the repo!"
            echo "  Run the embedding script locally and commit the directory."
            exit 1
          fi
          echo "my_chroma_db/ found ($(du -sh my_chroma_db | cut -f1))"

      # ── Write a CI-safe .env (real key needed for LLM/NeMo init) ──
      - name: Write CI .env
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cat > .env <<EOF
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_MODEL=openai:gpt-4o-mini
          PORT=8001
          OTEL_ENDPOINT=http://localhost:4318
          OTEL_SKIP_SPAN_TEST=1
          SPLUNK_HEC_TOKEN=ci-dummy-token
          SPLUNK_HEC_URL=http://localhost:8088
          SENDER_EMAIL=ci@example.com
          SENDER_PASSWORD=ci-dummy-password
          RECIPIENT_EMAIL=ci@example.com
          SMTP_SERVER=smtp.gmail.com
          SMTP_PORT=587
          FRUSTRATION_THRESHOLD=0.6
          ESCALATION_TRIGGER_COUNT=3
          EOF

      # ── Build image ──
      - name: Build Docker image
        run: docker build -t ai-observability-bot:ci .

      # ── Start ONLY the bot (no otel-collector; its config lives on the VM) ──
      - name: Start container
        run: |
          docker run -d \
            --name ci-bot \
            -p 8001:8001 \
            --env-file .env \
            -v "$(pwd)/my_chroma_db:/app/my_chroma_db" \
            ai-observability-bot:ci

      # ── Poll until ChromaDB reports documents (max 120 s) ──
      - name: Wait for ChromaDB to load
        run: |
          echo "Polling /health for ChromaDB readiness (max 120s)..."
          for i in $(seq 1 24); do
            RESP=$(curl -s http://localhost:8001/health 2>/dev/null || echo '{}')
            DOC_COUNT=$(echo "$RESP" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('chroma_db',{}).get('document_count',0))" \
              2>/dev/null || echo 0)
            echo "Attempt $i/24 — chroma document_count=${DOC_COUNT}"
            if [ "$DOC_COUNT" -gt 0 ]; then
              echo "ChromaDB is loaded."
              break
            fi
            if [ "$i" -eq 24 ]; then
              echo "TIMEOUT: ChromaDB never became ready."
              exit 1
            fi
            sleep 5
          done

      # ── Final assertions on the health payload ──
      - name: Assert health checks pass
        run: |
          curl -sf http://localhost:8001/health -o /tmp/ci_health.json
          cat /tmp/ci_health.json
          python3 <<'PYEOF'
          import json, sys

          with open("/tmp/ci_health.json") as f:
              d = json.load(f)
          rag   = d.get("rag_system", {})
          chroma = d.get("chroma_db", {})

          failures = []

          # 1. ChromaDB volume mount — the most critical check
          count = chroma.get("document_count", 0)
          if count == 0:
              failures.append(
                  f"ChromaDB document_count=0 at path '{chroma.get('persist_path')}'. "
                  "Volume is likely NOT mounted — check docker run -v flag."
              )

          # 2. Embedding model must load (no network needed)
          if not rag.get("embedding_model_loaded"):
              failures.append("Embedding model failed to load (sentence-transformers)")

          # 3. Chroma collection object must be initialised
          if not rag.get("chroma_collection_ready"):
              failures.append("ChromaDB collection object not ready")

          if failures:
              for f in failures:
                  print(f"FAIL: {f}")
              sys.exit(1)

          overall = d.get("status", "unknown")
          print(f"PASS  chroma_docs={count}  embedding=OK  collection=OK  status={overall}")
          PYEOF

      # ── Always dump logs on failure for debugging ──
      - name: Dump container logs (on failure)
        if: failure()
        run: docker logs ci-bot

      - name: Cleanup
        if: always()
        run: docker rm -f ci-bot 2>/dev/null || true

  # ──────────────────────────────────────────────
  # Job 3: Deploy to Oracle OCI VM (main branch only)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to OCI
    needs: [lint, docker-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH deploy & post-deploy health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          # Fail fast — any non-zero exit aborts the deploy
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/ai-observability-bot

            echo "=== [1/5] Pull latest code ==="
            git pull origin main

            echo "=== [2/5] Verify my_chroma_db exists on VM ==="
            if [ ! -d "my_chroma_db" ]; then
              echo "ERROR: my_chroma_db/ missing on VM!"
              echo "  Run the embedding script on the VM to regenerate it."
              exit 1
            fi
            echo "my_chroma_db OK ($(du -sh my_chroma_db | cut -f1))"

            echo "=== [3/5] Rebuild and restart ==="
            docker compose down --timeout 30
            docker compose build --no-cache ai-observability-bot
            docker compose up -d

            echo "=== [4/5] Wait 90s for service startup ==="
            sleep 90

            echo "=== [5/5] Post-deploy health check ==="
            curl -sf http://localhost:8001/health -o /tmp/health.json
            cat /tmp/health.json

            python3 <<'PYEOF'
            import json, sys

            with open("/tmp/health.json") as f:
                d = json.load(f)

            chroma = d.get("chroma_db", {})
            rag    = d.get("rag_system", {})
            status = d.get("status", "unknown")

            failures = []

            count = chroma.get("document_count", 0)
            if count == 0:
                failures.append(
                    f"ChromaDB document_count=0 — volume mount may be broken. "
                    f"Check docker-compose.yml volumes section."
                )

            if not rag.get("embedding_model_loaded"):
                failures.append("Embedding model not loaded")

            if not rag.get("chroma_collection_ready"):
                failures.append("Chroma collection not ready")

            if failures:
                for f in failures:
                    print(f"DEPLOY FAIL: {f}")
                sys.exit(1)

            if status != "healthy":
                print(f"WARNING: service status='{status}' (not fully healthy yet)")
                print("  LLM / NeMo may still be initializing — check logs if this persists.")

            print(f"Deploy OK: status={status}  chroma_docs={count}  embedding=OK")
            PYEOF

            echo "=== Deployment complete ==="
