<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ persona_display_name }} | Chat</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #chat-container {
            position: static !important;
            visibility: visible !important;
            opacity: 1 !important;
            transform: none !important;
            pointer-events: auto !important;
            width: 400px;
            max-width: 95vw;
            height: 550px;
            max-height: 90vh;
        }
    </style>
</head>

<body>
    <div class="chat-container" id="chat-container">
        <div class="chat-header">
            <div>
                <h3>{{ persona_display_name }}</h3>
            </div>
        </div>
        <div class="chat-history" id="chat-history">
            <div class="message bot-message">{{ persona_greeting }}</div>
        </div>
        <div id="typing-indicator" class="typing-indicator" style="display: none;">
            <span></span><span></span><span></span>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off">
            <button id="send-button">Send</button>
        </div>
        <div class="loading-indicator" id="loading-indicator" style="display: none;">Thinking...</div>
    </div>

    <script>
        window.PERSONA_ID = "{{ persona_id }}";
    </script>
    <script src="/static/persona-script.js"></script>
</body>

</html>
