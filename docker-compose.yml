services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    volumes:
      - /home/ubuntu/otel/otel-splunk-4-5.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - observability-net
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-observability-postgres
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_password
      POSTGRES_DB: chatbot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - observability-net
    restart: unless-stopped

  ai-observability-bot:
    build: .
    container_name: ai-observability-bot
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://chatbot:chatbot_password@postgres:5432/chatbot_db
    env_file:
      - .env
    networks:
      - observability-net
    restart: unless-stopped
    depends_on:
      - otel-collector
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  observability-net:
    driver: bridge

volumes:
  postgres_data:
