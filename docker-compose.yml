version: '3.8'

services:
  ai-observability-bot:
    build: .
    container_name: ai-observability-bot
    ports:
      - "8001:8001"
    env_file:
      - .env
    networks:
      - observability-net
    volumes:
      # Persist ChromaDB data between container restarts.
      # Path must match CHROMA_PERSIST_PATH in backend/agent.py → /app/amelia_chroma_db
      - ./amelia_chroma_db:/app/amelia_chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # give the RAG system time to initialize on first boot

networks:
  # Created automatically if it doesn't exist yet.
  # The OTEL collector container (started separately) should be attached to
  # this same network so that OTEL_ENDPOINT=http://otel-collector:4328 resolves.
  # To attach an existing collector: docker network connect observability-net <collector-container-name>
  observability-net:
    driver: bridge
